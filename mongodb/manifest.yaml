apiVersion: v1 
kind: Deployment
metadata:
  name: nginx
  # these are replicaset labels.
  labels:
    project: roboshop
    purpose: rs-demo 
    tier: frontend
    component: frontend
  annotations:
    kubernetes.io/change-cause: "moving to 1.29.7"
spec:
  replicas: 3
  selector:
    # Using these labels replicaset selects the pod.
    matchLabels:
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
  # This is pod definition,  pod is subset of replicaset
  template:
  metadata: 
    labels:
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:1.29.7