apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  # these are replicaset labels.
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  replicas: 1
  selector:
    # Using these labels replicaset selects the pod.
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  # This is pod definition,  pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0
---
apiVersion: v1        # its cluster service.
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  selector:
    # Labels (resource) is used to select pods to provide network ☝️.
    project: roboshop
    tier: db
    component: redis
  ports:
  - protocol: TCP
    port: 5679 # service port
    targetPort: 5679 # container port