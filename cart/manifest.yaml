apiVersion: v1 
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
data: 
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  # these are replicaset labels.
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  replicas: 1
  selector:
    # Using these labels replicaset selects the pod.
    matchLabels:
      project: roboshop
      tier: backend
      component: cart
  # This is pod definition,  pod is subset of replicaset
  template:
    metadata: 
      labels:
        project: roboshop
        tier: backend
        component: cart
    spec:
      containers:
      - name: cart
        image: lokeshlh/cart:1.4.0
        imagePullPolicy: Always # safe to pull everytime, there may be images with same version.
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
          # httpGet:
          #   path: /health
          #   port: 8080
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8080

        envFrom:
        - configMapRef:
            name: cart
---
apiVersion: v1        # its cluster service.
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  selector:
    # Labels (resource) is used to select pods to provide network ☝️.
    project: roboshop
    tier: backend
    component: cart
  ports:
  - protocol: TCP
    port: 8080 # service port
    targetPort: 8080 # container port