apiVersion: v1 
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
data: 
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
  trainer: "someone" 
---
apiVersion: v1 
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  # these are replicaset labels.
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  replicas: 1
  selector:
    # Using these labels replicaset selects the pod.
    matchLabels:
      project: roboshop
      tier: backend
      component: mongodb
  # This is pod definition,  pod is subset of replicaset
  template:
  metadata: 
    labels:
      project: roboshop
      tier: backend
      component: catalogue
    spec:
      containers:
      - name: catalogue
        image: lokeshlh/catalogue:1.0.0
        envFrom:
        - configMapRef:
            name: catalogue
---
apiVersion: v1        # its cluster service.
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  selector:
    # Labels (resource) is used to select pods to provide network ☝️.
    project: roboshop
    tier: backend
    component: catalogue
  ports:
  - protocol: TCP
    port: 8080 # service port
    targetPort: 8080 # container port